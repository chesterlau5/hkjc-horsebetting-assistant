<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HKJC AI Racing Research Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen antialiased font-sans">

  <div class="max-w-4xl mx-auto p-4 md:p-8">
    <header class="mb-8 border-b border-gray-800 pb-6">
      <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
        HKJC AI Racing Assistant
      </h1>
      <p class="text-gray-400 mt-2">Objective, data-driven statistical insights driven by Gemini 2.5 Flash</p>
    </header>

    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl mb-8">
      <div class="flex space-x-4 mb-6 border-b border-gray-700 pb-3">
        <button id="tab-text" class="pb-2 px-1 text-sm font-medium border-b-2 border-yellow-500 text-yellow-400 focus:outline-none">
          Paste Raw Text (Highly Recommended)
        </button>
      </div>

      <div id="container-text" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-300 mb-2">Paste Race Card Content</label>
          <textarea id="input-text" rows="8" placeholder="Select all text (Ctrl+A) on the HKJC Race Card page, copy it, and paste it here..." 
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition-colors text-xs font-mono"></textarea>
        </div>
      </div>

      <div class="mt-6 flex justify-end">
        <button id="btn-submit" class="bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-600 hover:to-orange-600 text-gray-900 font-bold px-6 py-3 rounded-lg shadow-lg transform active:scale-95 transition-all flex items-center space-x-2">
          <span>Analyze Race Data</span>
        </button>
      </div>
    </div>

    <div id="loading" class="hidden text-center py-12">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-t-yellow-500 border-gray-700 mb-4"></div>
      <p class="text-gray-400 text-sm">Parsing structural elements and compiling margins...</p>
    </div>

    <div id="error-box" class="hidden bg-red-950/50 border border-red-800 text-red-200 p-4 rounded-xl mb-8 text-sm"></div>

    <main id="results" class="hidden space-y-6">
      <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl">
        <div class="flex flex-wrap justify-between items-baseline mb-4">
          <h2 id="res-title" class="text-2xl font-bold text-white">Race Title</h2>
          <span id="res-date" class="text-sm font-mono text-gray-400">Date</span>
        </div>
        <p id="res-summary" class="text-gray-300 leading-relaxed text-sm bg-gray-900/50 p-4 rounded-lg border border-gray-700/50"></p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl">
          <h3 class="text-lg font-bold text-yellow-400 mb-4 flex items-center">
            <span class="mr-2">⭐</span> Top Statistical Contenders
          </h3>
          <div id="res-contenders" class="space-y-4"></div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl">
          <h3 class="text-lg font-bold text-emerald-400 mb-4 flex items-center">
            <span class="mr-2">📊</span> Evaluated Value Selections
          </h3>
          <div id="res-value" class="space-y-4"></div>
        </div>
      </div>

      <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3">Core Factors Indexed</h3>
        <div id="res-factors" class="flex flex-wrap gap-2"></div>
      </div>
    </main>
  </div>

  <script>
    const btnSubmit = document.getElementById('btn-submit');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('error-box');
    const results = document.getElementById('results');

    btnSubmit.addEventListener('click', async () => {
      errorBox.classList.add('hidden');
      results.classList.add('hidden');
      
      const textValue = document.getElementById('input-text').value.trim();
      if (!textValue) return alert('Please copy-paste raw text card content first');

      loading.classList.remove('hidden');

      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rawText: textValue })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Server error occurred.');

        renderOutput(data);
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
      }
    });

    function renderOutput(data) {
      document.getElementById('res-title').textContent = data.raceName || 'HKJC Race Analysis';
      document.getElementById('res-date').textContent = data.date || '';
      document.getElementById('res-summary').textContent = data.analysis?.summary || '';

      const contContainer = document.getElementById('res-contenders');
      const valContainer = document.getElementById('res-value');
      const factorsContainer = document.getElementById('res-factors');
      
      contContainer.innerHTML = '';
      valContainer.innerHTML = '';
      factorsContainer.innerHTML = '';

      if(data.analysis?.topContenders?.length > 0) {
        data.analysis.topContenders.forEach(h => {
          contContainer.appendChild(createHorseCard(h, 'border-yellow-500/30 bg-yellow-500/5'));
        });
      } else {
        contContainer.innerHTML = `<p class="text-sm text-gray-500 italic">No standout high structural edge factors noted.</p>`;
      }

      if(data.analysis?.valueHorses?.length > 0) {
        data.analysis.valueHorses.forEach(h => {
          valContainer.appendChild(createHorseCard(h, 'border-emerald-500/30 bg-emerald-500/5'));
        });
      } else {
        valContainer.innerHTML = `<p class="text-sm text-gray-500 italic">No clear discrepancies found relative to trend arrays.</p>`;
      }

      if(data.analysis?.factorsConsidered) {
        data.analysis.factorsConsidered.forEach(f => {
          const span = document.createElement('span');
          span.className = "text-xs bg-gray-700 border border-gray-600 text-gray-300 px-2.5 py-1 rounded-md";
          span.textContent = f;
          factorsContainer.appendChild(span);
        });
      }

      results.classList.remove('hidden');
    }

    function createHorseCard(horse, visualClasses) {
      const div = document.createElement('div');
      div.className = `p-3 rounded-lg border ${visualClasses} flex items-start space-x-3`;
      div.innerHTML = `
        <div class="bg-gray-900 border border-gray-700 text-sm font-bold rounded px-2 py-0.5 min-w-[2.5rem] text-center text-gray-200">
          #${horse.horseNumber}
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="font-bold text-sm text-gray-100 truncate">${horse.horseName}</h4>
          <p class="text-xs text-gray-400 mt-1 leading-normal">${horse.keyStats}</p>
        </div>
      `;
      return div;
    }
  </script>
</body>
</html>
